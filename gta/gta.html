<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REVV | High-Performance Auto Parts</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <nav>
        <div class="logo" onclick="location.reload()">REVV<span>.</span></div>
        <div class="nav-center">
            <input type="text" id="searchInput" placeholder="Search brand or part...">
        </div>
        <div class="nav-right">
            <div class="cart-trigger" onclick="toggleCart()">GARAGE <span id="cartCount">0</span></div>
        </div>
    </nav>

    <header>
        <div class="hero-content">
            <h1>PRECISION <span>ENGINEERING</span></h1>
            <div class="filter-tabs">
                <button class="filter-btn active" onclick="filterProducts('all', this)">All Parts</button>
                <button class="filter-btn" onclick="filterProducts('popular', this)">🔥 Popular</button>
                <button class="filter-btn" onclick="filterProducts('sale', this)">🏷️ On Sale</button>
            </div>
        </div>
    </header>

    <main id="productGrid" class="grid"></main>

    <div id="cartSidebar" class="sidebar">
        <div class="sidebar-header">
            <h2>Your Garage</h2>
            <button onclick="toggleCart()">✕</button>
        </div>
        <div id="cartItems"></div>
        <div class="cart-footer">
            <div class="total">Total: <span id="totalPrice">$0.00</span></div>
            <button class="checkout-btn" onclick="checkout()">CHECKOUT</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
